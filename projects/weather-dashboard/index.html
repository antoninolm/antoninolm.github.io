<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Weather Dashboard — real-time weather using the OpenWeatherMap API">
  <title>Weather Dashboard // ALM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <header class="site-header">
      <a class="brand" href="../../index.html"><span>[</span>ALM<span>]</span></a>
      <a class="back-link" href="../../index.html">&larr; BACK TO PORTFOLIO</a>
    </header>

    <main>
      <h1>// WEATHER_DASHBOARD</h1>
      <p class="subtitle">Real-time conditions &amp; 5-day forecast via OpenWeatherMap API</p>

      <div class="search-row">
        <input
          type="text"
          id="city-input"
          placeholder="Enter city name…"
          autocomplete="off"
          spellcheck="false"
          aria-label="City name"
        >
        <button class="btn" id="search-btn">SEARCH &rarr;</button>
        <button class="btn btn--ghost" id="unit-toggle" aria-label="Toggle temperature unit">°C / °F</button>
      </div>

      <p class="status" id="status" role="status" aria-live="polite"></p>

      <!-- Current conditions -->
      <section id="current-weather" hidden aria-label="Current weather conditions">
        <div class="current-card">
          <div class="current-card__icon">
            <img id="weather-icon" src="" alt="">
          </div>
          <div class="current-card__main">
            <p class="city-name" id="city-name"></p>
            <p class="temp" id="temp"></p>
            <p class="description" id="description"></p>
          </div>
          <div class="current-card__meta">
            <div class="meta-item">
              <span class="meta-item__label">FEELS LIKE</span>
              <span class="meta-item__value" id="feels-like"></span>
            </div>
            <div class="meta-item">
              <span class="meta-item__label">HUMIDITY</span>
              <span class="meta-item__value" id="humidity"></span>
            </div>
            <div class="meta-item">
              <span class="meta-item__label">WIND</span>
              <span class="meta-item__value" id="wind"></span>
            </div>
          </div>
        </div>
      </section>

      <!-- 5-day forecast -->
      <section id="forecast" hidden aria-label="5-day forecast">
        <p class="section-label">// 5-DAY FORECAST</p>
        <div class="forecast-grid" id="forecast-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Data by <a href="https://openweathermap.org/" target="_blank" rel="noopener">OpenWeatherMap</a> &mdash; free tier API</p>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
